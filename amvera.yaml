meta:
  environment: nodejs
  toolchain:
    name: nodejs
    version: '18'

build:
  commands:
    - npm install
    - cd server && npm install

run:
  commands:
    - node server/server.js

port: 3000

env:
  - name: NODE_ENV
    value: production
  - name: ADMIN_USERNAME
    value: user
  - name: SESSION_SECRET
    value: ariawave-secret-key-min-32-characters-long
  - name: PORT
    value: "3000"