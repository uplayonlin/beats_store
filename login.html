<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - @ariawave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .login-card .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #901a1a;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(144, 26, 26, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .btn-primary {
            background: #901a1a;
            border-color: #6e1313;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background: #e04f54;
        }
        .alert-danger {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
            color: #ff6b6b;
            border-radius: 8px;
        }
        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><i class="fas fa-lock me-2"></i>Admin Login</h1>
        <p class="subtitle">@ariawave</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
            <div id="loginMessage"></div>
        </form>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left me-1"></i>Back to Store</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('loginMessage');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    message.innerHTML = '<div class="alert alert-success">✅ Login successful!</div>';
                    setTimeout(() => { window.location.href = '/admin.html'; }, 500);
                } else {
                    message.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
                }
            } catch (error) {
                message.innerHTML = '<div class="alert alert-danger">❌ Server error</div>';
            }
        });
    </script>
</body>
</html>
